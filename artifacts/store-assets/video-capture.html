<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>梦境客服中心实机录屏</title>
    <style>
      html,
      body {
        width: 720px;
        height: 720px;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 0%, rgba(125, 211, 252, 0.22), transparent 300px),
          radial-gradient(circle at 82% 0%, rgba(240, 171, 252, 0.18), transparent 280px),
          #0b0d16;
      }

      .stage {
        position: relative;
        width: 720px;
        height: 720px;
        overflow: hidden;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 720px;
        height: 720px;
        border: 0;
        background: #0b0d16;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <iframe id="gameFrame" title="梦境客服中心实机演示" scrolling="no"></iframe>
    </div>
    <script>
      const frame = document.querySelector("#gameFrame");
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      async function setState(state, scrollY = 0) {
        frame.src = `../../index.html?store_state=${state}&take=${Date.now()}`;
        await new Promise((resolve) => frame.addEventListener("load", resolve, { once: true }));
        const doc = frame.contentDocument;
        const style = doc.createElement("style");
        style.textContent = "html,body{scrollbar-width:none;overflow:hidden}::-webkit-scrollbar{display:none}";
        doc.head.appendChild(style);
        frame.contentWindow.scrollTo(0, scrollY);
      }

      async function runDemo() {
        await setState("opening", 0);
        await wait(4200);
        await setState("core", 220);
        await wait(5200);
        await setState("core", 620);
        await wait(5200);
        await setState("result", 520);
        await wait(6200);
        await setState("result", 820);
      }

      runDemo();
    </script>
  </body>
</html>
